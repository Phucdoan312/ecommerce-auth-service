# ==========================================
# Server Configuration
# ==========================================
server.port=8080
spring.application.name=auth-service

# ==========================================
# PostgreSQL Database
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# JWT Security Configuration
# ==========================================
application.security.jwt.secret=${JWT_SECRET_KEY:DayLaChuoiBiMatDeTestDuoiMayTinhNha123456}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000
application.security.otp.expiration-minutes=2

# ==========================================
# Email SMTP Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:phucdoan849@gmail.com}
spring.mail.password=${MAIL_PASSWORD:123}
#iofp taer wwkw hnms
spring.mail.properties.mail.smtp.auth=true  
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.timeout=5000